<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Rich indigo-to-purple gradient, diagonal -->
    <linearGradient id="bg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Top-left glare for macOS lighting feel -->
    <radialGradient id="shine" cx="28%" cy="6%" r="62%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom vignette for depth -->
    <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="40%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Soft shadow under document card -->
    <filter id="card-shadow" x="-30%" y="-20%" width="160%" height="155%">
      <feDropShadow dx="0" dy="16" stdDeviation="24"
                    flood-color="#1E0859" flood-opacity="0.45"/>
    </filter>

    <!-- Glow for sparkle badge -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (macOS clips to squircle) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#shine)"/>
  <rect width="512" height="512" fill="url(#vignette)"/>

  <!-- White document card -->
  <g filter="url(#card-shadow)">
    <rect x="100" y="72" width="308" height="382" rx="26" fill="white"/>
  </g>

  <!-- Colored header band -->
  <rect x="100" y="72"  width="308" height="92" rx="26" fill="#EEF2FF"/>
  <rect x="100" y="140" width="308" height="24"          fill="#EEF2FF"/>

  <!-- Header: title pill -->
  <rect x="134" y="104" width="160" height="18" rx="9" fill="#818CF8"/>
  <!-- Header: subtitle/date pill -->
  <rect x="134" y="134" width="100" height="12" rx="6" fill="#C7D2FE"/>

  <!-- Separator line -->
  <line x1="100" y1="164" x2="408" y2="164" stroke="#EAEAEA" stroke-width="1.5"/>

  <!-- Body text lines -->
  <rect x="134" y="186" width="244" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="213" width="222" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="240" width="244" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="267" width="196" height="13" rx="6.5" fill="#E2E8F0"/>

  <!-- Second paragraph -->
  <rect x="134" y="307" width="244" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="334" width="178" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="361" width="244" height="13" rx="6.5" fill="#E2E8F0"/>
  <rect x="134" y="388" width="130" height="13" rx="6.5" fill="#E2E8F0"/>

  <!-- Auto/AI sparkle badge — golden star, lower-right -->
  <g filter="url(#glow)">
    <!-- Outer glow disc -->
    <circle cx="374" cy="388" r="46" fill="#FFD60A" opacity="0.28"/>
    <!-- Solid badge circle -->
    <circle cx="374" cy="388" r="36" fill="#FFD60A"/>
    <!-- 4-pointed sparkle star in white -->
    <path d="M374,362
             C374,373 382,380 393,380
             C382,380 374,388 374,399
             C374,388 366,380 355,380
             C366,380 374,373 374,362 Z"
          fill="white"/>
    <!-- Smaller inner star layer for sparkle depth -->
    <path d="M374,368
             C374,375 379,380 386,380
             C379,380 374,385 374,392
             C374,385 369,380 362,380
             C369,380 374,375 374,368 Z"
          fill="white" opacity="0.55"/>
  </g>
</svg>
